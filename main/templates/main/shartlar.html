<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavjudlik Shartlari</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 flex flex-col items-center gap-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h1 class="text-xl font-bold text-slate-900 mb-4 border-b border-slate-100 pb-3">🟢 Kitoblar Holati (If/Else)</h1>
        <div class="space-y-2">
            {% for kitob in kitoblar %}
                <div class="flex justify-between items-center bg-slate-50 border border-slate-100 p-3 rounded-xl">
                    <span class="font-medium text-slate-800">{{ kitob.nom }}</span>
                    {% if kitob.mavjud %}
                        <span class="bg-emerald-50 text-emerald-700 text-xs font-bold px-2.5 py-1 rounded-full border border-emerald-100">Mavjud</span>
                    {% else %}
                        <span class="bg-rose-50 text-rose-700 text-xs font-bold px-2.5 py-1 rounded-full border border-rose-100">Mavjud emas</span>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
    </div>

    <a href="/home/" class="text-slate-500 hover:text-slate-800 font-bold text-sm bg-white border border-slate-200 py-2 px-6 rounded-xl shadow-sm transition duration-200">
        ← Asosiy menyuga qaytish
    </a>
</body>
</html>
