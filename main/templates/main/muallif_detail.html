<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ muallif.ism_familiya }}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 flex flex-col items-center gap-4">
    <div class="max-w-lg w-full bg-white rounded-2xl shadow-md border border-slate-100 p-6">
        <h1 class="text-2xl font-black text-slate-900">{{ muallif.ism_familiya }}</h1>
        <p class="text-sm text-slate-400 mt-1">📍 Yashash joyi: {{ muallif.shahar }}</p>

        <h3 class="text-md font-bold text-slate-800 mt-6 mb-3">📚 Muallifning barcha kitoblari:</h3>
        <div class="grid grid-cols-1 gap-2">
            {% for kitob in muallif.kitoblari.all %}
                <div class="p-3 bg-slate-50 border border-slate-100 rounded-xl font-medium text-slate-700">{{ kitob.nom }}</div>
            {% empty %}
                <p class="text-sm text-slate-400 bg-slate-50 p-4 rounded-xl text-center">Ushbu muallifga tegishli kitoblar topilmadi.</p>
            {% endfor %}
        </div>
    </div>

    <a href="/home/" class="text-slate-500 hover:text-slate-800 font-bold text-sm bg-white border border-slate-200 py-2 px-6 rounded-xl shadow-sm transition duration-200">
        ← Asosiy menyuga qaytish
    </a>
</body>
</html>
