{% extends 'main/base.html' %}

{% block sarlavha %}Kitoblar Ro'yxati{% endblock %}

{% block kontent %}
<div class="flex flex-col items-center gap-6 my-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h1 class="text-xl font-bold text-slate-900 border-b border-slate-100 pb-3 mb-4">📚 Barcha Kitoblar</h1>
        <ul class="space-y-2">
            {% for k in kitoblar %}
                <li class="bg-slate-50 hover:bg-slate-100 border border-slate-100 rounded-xl p-3 text-slate-700 font-medium transition duration-150">{{ k.nom }}</li>
            {% empty %}
                <li class="bg-amber-50 text-amber-700 border border-amber-100 rounded-xl p-4 text-center text-sm font-semibold">Kitoblar topilmadi</li>
            {% endfor %}
        </ul>
    </div>

    <a href="{% url 'home' %}" class="text-slate-500 hover:text-slate-800 font-bold text-sm bg-white border border-slate-200 py-2 px-6 rounded-xl shadow-sm transition duration-200">
        ← Asosiy menyuga qaytish
    </a>
</div>
{% endblock %}
