<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitoblar Ro'yxati</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 flex flex-col items-center gap-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h1 class="text-xl font-bold text-slate-900 border-b border-slate-100 pb-3 mb-4">📚 Barcha Kitoblar</h1>
        <ul class="space-y-2">
            {% for k in kitoblar %}
                <li class="bg-slate-50 hover:bg-slate-100 border border-slate-100 rounded-xl p-3 text-slate-700 font-medium transition duration-150">{{ k.nom }}</li>
            {% empty %}
                <li class="bg-amber-50 text-amber-700 border border-amber-100 rounded-xl p-4 text-center text-sm font-semibold">Kitoblar yo'q</li>
            {% endfor %}
        </ul>
    </div>

    <a href="/home/" class="text-slate-500 hover:text-slate-800 font-bold text-sm bg-white border border-slate-200 py-2 px-6 rounded-xl shadow-sm transition duration-200">
        ← Asosiy menyuga qaytish
    </a>
</body>
</html>
