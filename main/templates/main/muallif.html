{% extends 'main/base.html' %}

{% block sarlavha %}Muallif Ma'lumotlari{% endblock %}

{% block kontent %}
<div class="flex flex-col items-center justify-center gap-6 my-10">
    <div class="bg-white rounded-2xl shadow-md border border-slate-100 p-6 max-w-sm w-full">
        <span class="bg-purple-100 text-purple-700 text-xs font-bold px-2.5 py-1 rounded-md">Yozuvchi</span>
        <h2 class="text-2xl font-black text-slate-900 mt-3">{{ muallif.ism_familiya }}</h2>
        <div class="mt-4 space-y-2 border-t border-slate-100 pt-4 text-sm text-slate-600">
            <p class="flex justify-between"><strong>Tug'ilgan yili:</strong> <span class="text-slate-900">{{ muallif.tugilgan_yili }}</span></p>
            <p class="flex justify-between"><strong>Shahar:</strong> <span class="text-slate-900">{{ muallif.shahar }}</span></p>
        </div>
    </div>

    <a href="{% url 'home' %}" class="text-slate-500 hover:text-slate-800 font-bold text-sm bg-white border border-slate-200 py-2 px-6 rounded-xl shadow-sm transition duration-200">
        ← Asosiy menyuga qaytish
    </a>
</div>
{% endblock %}
