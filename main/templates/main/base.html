<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block sarlavha %}Kutubxona Tizimi{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-teal-400 text-transparent bg-clip-text">
                📚 SmartKutubxona
            </div>
            <div class="flex gap-6 font-semibold text-sm">
                <a href="{% url 'home' %}" class="text-slate-300 hover:text-white transition duration-200">Bosh sahifa</a>
                <a href="{% url 'haqida' %}" class="text-slate-300 hover:text-white transition duration-200">Haqida</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8">
        {% block kontent %}{% endblock %}
    </main>

    <footer class="bg-slate-900 text-slate-500 py-6 text-center border-t border-slate-800 text-sm">
        <p>© 2026 Smart Kutubxona Tizimi. Barcha huquqlar himoyalangan.</p>
    </footer>

</body>
</html>
